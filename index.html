<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 APNA LUDO PREMIUM 🎲</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2A1A4E;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 460px;
            padding: 15px;
            text-align: center;
        }
        
        /* === ٹاپ بار (تصویر کی طرح) === */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }
        .spectator-badge {
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* === اصلی پریمیم لڈو بورڈ (15x15 گریڈ) === */
        .ludo-board {
            width: 390px;
            height: 390px;
            background: #FFF;
            margin: 10px auto;
            border: 6px solid #5c3b8e;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        /* بڑے ہوم باکسز (6x6) */
        .big-home { grid-column: span 6; grid-row: span 6; position: relative; border: 1px solid #CCC; display: flex; justify-content: center; align-items: center; }
        .red-home { background: #ED1C24; }
        .green-home { background: #00A859; }
        .yellow-home { background: #FFCC00; }
        .blue-home { background: #0054A6; }
        
        .inner-box { width: 70%; height: 70%; background: #FFF; border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; padding: 5px; box-sizing: border-box; }
        
        /* چھوٹے خانے (Tracks) */
        .cell { border: 1px solid #DDD; background: #FFF; box-sizing: border-box; position: relative; }
        .red-cell { background: #ED1C24; }
        .green-cell { background: #00A859; }
        .yellow-cell { background: #FFCC00; }
        .blue-cell { background: #0054A6; }
        
        /* اسٹار / سیف زون خانے */
        .star-cell::after { content: "⭐"; font-size: 11px; position: absolute; top: 15%; left: 15%; color: #666; }

        /* سینٹر ہوم (3x3) */
        .center-home {
            grid-column: span 3;
            grid-row: span 3;
            background: #FFF;
            position: relative;
            background-image: conic-gradient(#ED1C24 0.25turn, #00A859 0.25turn 0.5turn, #FFCC00 0.5turn 0.75turn, #0054A6 0.75turn);
        }

        /* اصلی گوٹیاں (Premium Tokens) */
        .token {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #FFF;
            display: inline-block;
            margin: auto;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            cursor: pointer;
            z-index: 5;
            position: absolute;
        }
        .token-red { background: radial-gradient(circle, #ff6b6b, #ED1C24); }
        
        /* باٹم کنٹرولز */
        .controls {
            margin-top: 20px;
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dice-box {
            width: 60px;
            height: 60px;
            background: white;
            color: #333;
            font-size: 32px;
            line-height: 60px;
            border-radius: 12px;
            margin: 10px auto;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-weight: bold;
        }
        .btn {
            padding: 10px 20px;
            background: #FFCC00;
            color: #333;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <div>⚙️</div>
            <div class="spectator-badge">👁️ Spectator 0</div>
            <div>🛍️</div>
        </div>

        <h3 style="color: #FFCC00; margin: 0;">🎲 اصلی پریمیم لڈو اسٹرکچر 🎲</h3>

        <div class="ludo-board">
            
            <div class="big-home green-home">
                <div class="inner-box">
                    <div style="background:#00A859; border-radius:50%; margin:4px;"></div>
                    <div style="background:#00A859; border-radius:50%; margin:4px;"></div>
                    <div style="background:#00A859; border-radius:50%; margin:4px;"></div>
                    <div style="background:#00A859; border-radius:50%; margin:4px;"></div>
                </div>
            </div>

            <div class="cell"></div><div class="cell green-cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell green-cell"></div><div class="cell green-cell star-cell"></div>
            <div class="cell star-cell"></div><div class="cell green-cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell green-cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell green-cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell green-cell"></div><div class="cell"></div>

            <div class="big-home yellow-home">
                <div class="inner-box">
                    <div style="background:#FFCC00; border-radius:50%; margin:4px;"></div>
                    <div style="background:#FFCC00; border-radius:50%; margin:4px;"></div>
                    <div style="background:#FFCC00; border-radius:50%; margin:4px;"></div>
                    <div style="background:#FFCC00; border-radius:50%; margin:4px;"></div>
                </div>
            </div>

            <div class="cell"></div><div class="cell star-cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="center-home"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell star-cell"></div><div class="cell"></div>

            <div class="cell"></div><div class="cell red-cell"></div><div class="cell red-cell"></div><div class="cell red-cell"></div><div class="cell red-cell"></div><div class="cell red-cell"></div>
            <div class="cell yellow-cell"></div><div class="cell yellow-cell"></div><div class="cell yellow-cell"></div><div class="cell yellow-cell"></div><div class="cell yellow-cell"></div><div class="cell"></div>

            <div class="cell"></div><div class="cell"></div><div class="cell red-cell star-cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

            <div class="big-home red-home">
                <div class="inner-box">
                    <div class="token token-red" style="position:relative; margin:5px;" id="rToken" onclick="moveRedToken()"></div>
                    <div style="background:#ED1C24; border-radius:50%; margin:4px;"></div>
                    <div style="background:#ED1C24; border-radius:50%; margin:4px;"></div>
                    <div style="background:#ED1C24; border-radius:50%; margin:4px;"></div>
                </div>
            </div>

            <div class="cell"></div><div class="cell blue-cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell blue-cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell blue-cell"></div><div class="cell"></div>
            <div class="cell star-cell"></div><div class="cell blue-cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell blue-cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell blue-cell"></div><div class="cell"></div>

            <div class="big-home blue-home">
                <div class="inner-box">
                    <div style="background:#0054A6; border-radius:50%; margin:4px;"></div>
                    <div style="background:#0054A6; border-radius:50%; margin:4px;"></div>
                    <div style="background:#0054A6; border-radius:50%; margin:4px;"></div>
                    <div style="background:#0054A6; border-radius:50%; margin:4px;"></div>
                </div>
            </div>

            <div id="start-point" style="position: absolute; width: 24px; height: 24px; top: 240px; left: 38px; z-index: 10;"></div>

        </div>

        <div class="controls">
            <div style="font-size:15px; margin-bottom:5px;">باری: <span style="color:#ED1C24; font-weight:bold;">RED</span></div>
            <div class="dice-box" id="web-dice" onclick="rollWebDice()">🎲</div>
            <div style="font-size:12px; color:#DDD;">ڈائس پر کلک کریں۔ جب <b>6</b> آئے گا، تو لال گوٹی پر کلک کریں، وہ پریمیم ٹریک پر باہر نکل آئے گی!</div>
        </div>
    </div>

    <script>
        let diceValue = 1;
        function rollWebDice() {
            diceValue = Math.floor(Math.random() * 6) + 1;
            const diceEmojis = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
            document.getElementById('web-dice').innerText = diceEmojis[diceValue];
            
            if(diceValue === 6) {
                alert("چھکا (6) آ گیا! اب سرخ گوٹی پر کلک کر کے اسے باہر نکالیں۔");
            }
        }

        function moveRedToken() {
            if(diceValue === 6) {
                const token = document.getElementById('rToken');
                const startPoint = document.getElementById('start-point');
                
                // گوٹی کو گرافیکلی اٹھا کر باہر ٹریک پر لانا
                startPoint.appendChild(token);
                token.style.position = "static";
                alert("زبردست! سرخ گوٹی پریمیم اسٹرکچر کے سٹارٹ پوائنٹ پر آ گئی ہے! 🔥");
            } else {
                alert("گوٹی باہر نکالنے کے لیے ڈائس پر کلک کر کے پہلے 6 لائیں۔");
            }
        }
    </script>

</body>
</html>
