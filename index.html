<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 APNA LUDO GAME 🎲</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2A1A4E;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 450px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 { color: #FFCC00; font-size: 28px; margin-bottom: 5px; }
        p { color: #DDD; font-size: 14px; margin-bottom: 20px; }
        
        /* لڈو بورڈ کا گرافکس اسٹرکچر */
        .ludo-board {
            width: 320px;
            height: 320px;
            background-color: #f0f0f0;
            margin: 20px auto;
            border: 5px solid #FFF;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .home-box { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        .red-home { background-color: #ED1C24; }
        .green-home { background-color: #00A859; }
        .yellow-home { background-color: #FFCC00; }
        .blue-home { background-color: #0054A6; }
        .center-box { background-color: #FFF; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #333; font-size: 12px; }
        
        /* گوٹیاں (Tokens) */
        .token {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #FFF;
            position: absolute;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .token:hover { transform: scale(1.2); }
        
        /* ڈائس کنٹرولر */
        .controls {
            margin-top: 15px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #00A859;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-practice { background: #00A859; margin-bottom: 15px; border: 2px solid #FFF; }
        .btn-yellow { background: #FFCC00; color: #333; }
        .btn-dice { background: #FFF; color: #333; width: auto; padding: 10px 25px; font-size: 20px; display: inline-block; margin: 10px 0; }
        
        .input-box { background: rgba(255,255,255,0.08); padding: 12px; border-radius: 10px; margin-bottom: 12px; text-align: left; }
        input { width: 92%; padding: 8px; border-radius: 5px; border: none; margin-top: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <h1>🎲 APNA LUDO 🎲</h1>
        <p>آن لائن رئیل ٹائم ملٹی پلیئر گیم</p>

        <button class="btn btn-practice" onclick="openPracticeBoard()">🕹️ پریکٹس موڈ کھولیں (Practice Board)</button>
        
        <div style="border-top: 1px dashed rgba(255,255,255,0.2); margin: 15px 0;"></div>

        <div class="input-box">
            <label>اپنا نام لکھیں:</label>
            <input type="text" id="pName" placeholder="یہاں نام لکھیں...">
        </div>

        <button class="btn" onclick="alert('روم بنایا جا رہا ہے... بیک اینڈ لنک ایکٹیو ہوتے ہی یہ کام کرے گا۔')">نیا روم بنائیں (Create Room)</button>
        <button class="btn btn-yellow" style="margin-top:10px;" onclick="alert('کوڈ چیک کیا جا رہا ہے...')">روم جوائن کریں (Join Room)</button>
    </div>

    <script>
        // پریکٹس بورڈ کا پورا اسٹرکچر اور لاجک
        function openPracticeBoard() {
            document.getElementById('main-container').innerHTML = `
                <h2 style="color: #FFCC00; margin-bottom: 5px;">🕹️ پریکٹس بورڈ موڈ</h2>
                <p style="margin-bottom: 10px;">یہاں آپ بورڈ کا ڈیزائن دیکھ سکتے ہیں اور گوٹی چلا سکتے ہیں</p>
                
                <div class="ludo-board">
                    <div class="home-box red-home">
                        <div class="token" style="background:#FFF; top:35%; left:35%; background-color:#ED1C24;" id="token1" onclick="moveToken('token1')"></div>
                    </div>
                    <div class="home-box" style="background:#DDD; font-size:10px; color:#666;">ٹریک</div>
                    <div class="home-box green-home">
                        <div class="token" style="background:#FFF; top:35%; left:35%; background-color:#00A859;"></div>
                    </div>
                    
                    <div class="home-box" style="background:#DDD; font-size:10px; color:#666;">ٹریک</div>
                    <div class="center-box">HOME</div>
                    <div class="home-box" style="background:#DDD; font-size:10px; color:#666;">ٹریک</div>
                    
                    <div class="home-box blue-home">
                        <div class="token" style="background:#FFF; top:35%; left:35%; background-color:#0054A6;"></div>
                    </div>
                    <div class="home-box" style="background:#DDD; font-size:10px; color:#666;">ٹریک</div>
                    <div class="home-box yellow-home">
                        <div class="token" style="background:#FFF; top:35%; left:35%; background-color:#FFCC00;"></div>
                    </div>
                </div>

                <div class="controls">
                    <div style="font-size:14px; margin-bottom:5px;">باری: <b style="color:#ED1C24;">RED</b></div>
                    <button class="btn btn-dice" id="dice-btn" onclick="rollPracticeDice()">🎲 1</button>
                    <div style="font-size:12px; color:#AAA; margin-top:5px;">چھکا (6) آنے پر سرخ گوٹی پر کلک کریں، وہ گھر سے باہر نکلے گی!</div>
                </div>

                <button class="btn btn-yellow" style="margin-top: 15px;" onclick="window.location.reload()">🔙 واپس ہوم اسکرین پر جائیں</button>
            `;
        }

        let currentDiceValue = 1;
        function rollPracticeDice() {
            // 1 سے 6 تک رینڈم نمبر نکالنا
            currentDiceValue = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-btn').innerText = "🎲 " + currentDiceValue;
            
            if(currentDiceValue === 6) {
                alert("واہ! 6 آ گیا۔ اب سرخ گوٹی پر کلک کر کے اسے باہر نکالیں!");
            }
        }

        function moveToken(tokenId) {
            if(currentDiceValue === 6) {
                const token = document.getElementById(tokenId);
                // گوٹی کو گھر سے نکال کر ٹریک پر لانا
                token.style.top = "45%";
                token.style.left = "38%";
                token.style.border = "2px solid #000";
                alert("سرخ گوٹی گھر سے نکل کر اسٹارٹ پوائنٹ پر آ گئی ہے! 🎉");
            } else {
                alert("گوٹی گھر کے اندر بند ہے۔ اسے باہر نکالنے کے لیے پہلے ڈائس رول کر کے 6 لائیں۔");
            }
        }
    </script>

</body>
</html>
